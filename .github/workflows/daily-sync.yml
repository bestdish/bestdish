name: Daily Database Sync (Prod to Dev)

on:
  schedule:
    # Run daily at 3 AM UTC (low-traffic time)
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  sync-databases:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database sync
        env:
          # Production database (source)
          PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          PROD_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          PROD_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}
          
          # Development database (destination)
          DEV_DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          DEV_SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
          DEV_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.DEV_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Starting automated sync at $(date)"
          npx tsx scripts/auto-sync-prod-to-dev.ts
          echo "Sync completed at $(date)"

      - name: Upload sync logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-logs-${{ github.run_number }}
          path: logs/sync-prod-to-dev-*.log
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Database sync failed! Check the logs for details."
          # Add notification service here (Slack, email, etc.)



